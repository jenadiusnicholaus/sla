server {
    listen 9202;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Never cache the SPA shell — stale index.html points at deleted hashed chunks
    # (e.g. Failed to fetch dynamically imported module: MessagesPage-….js).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri/ /index.html;
        # HTML fallbacks from try_files also must not be cached long-term
        add_header Cache-Control "no-cache";
    }

    # Hashed Vite assets can be cached forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|otf|mp4|webm)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
